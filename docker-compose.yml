# Spectre — the full product stack (open-core).
#
#   shell  (built here, public)  ── /api proxy ──>  core (built from ./core, loopback)
#                                                    ├─ chat-runner (durable chat)
#                                                    └─ scheduler  (nightly maint.)
#
# The core is BUILT FROM SOURCE (`./core`, its own Dockerfile) and tagged
# `spectre-core:local`; the chat-runner/scheduler/channel-runner reuse that same
# locally-built image (no rebuild — just a different entrypoint). The shell is
# built locally from this public repo; it bakes in NO storage credentials (the
# browser only ever talks to /api/*). One `.env.docker` (written by
# `installer/install.mjs`) feeds every service. Ollama runs on the host
# (host.docker.internal). The shell is the only front door; core stays loopback.
# Update: the web UI's "Update now" button (updater sidecar, `update` profile) or
# `node scripts/spectre-update.mjs --apply` — both bake SPECTRE_BUILD_SHA in for
# version detection. Manual fallback: git pull && docker compose up -d --build.
# See agent-install/README.md "## Update".
name: spectre

services:
  # Provider-agnostic model gateway — the STANDARD brain backend. Your own keys /
  # self-hosted models (litellm-config.yaml); the core talks only to this. Loopback.
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    volumes:
      # :Z relabels for SELinux-enforcing hosts (Fedora/RHEL); ignored elsewhere.
      - "./litellm-config.yaml:/app/config.yaml:ro,Z"
    env_file: [.env.docker]
    environment:
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:-sk-spectre}"
      # Provider API keys passed into the gateway (absent keys are empty -- LiteLLM
      # ignores unconfigured providers). Add more in .env.docker as needed.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GOOGLE_GENAI_API_KEY: "${GOOGLE_GENAI_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      MISTRAL_API_KEY: "${MISTRAL_API_KEY:-}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      XAI_API_KEY: "${XAI_API_KEY:-}"
      TOGETHER_API_KEY: "${TOGETHER_API_KEY:-}"
      FIREWORKS_API_KEY: "${FIREWORKS_API_KEY:-}"
      CEREBRAS_API_KEY: "${CEREBRAS_API_KEY:-}"
      PERPLEXITY_API_KEY: "${PERPLEXITY_API_KEY:-}"
      HF_TOKEN: "${HF_TOKEN:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:4000:4000"
    restart: unless-stopped

  core:
    # Built from source (./core, its own Dockerfile → dist/ bun binaries) and
    # tagged locally; the runner services below reuse this same built image.
    build:
      context: ./core
      args:
        # Set INSTALL_CLIS=1 (in .env.docker) to bundle the Claude Code + Codex CLIs
        # into the image so the subscription "brains" work in the containerized core.
        # Auth is set at runtime in Settings (SPECTRE_ALLOW_CLI_UI=1), no rebuild.
        INSTALL_CLIS: "${INSTALL_CLIS:-0}"
        # Git SHA the image is built from (set by scripts/spectre-update.mjs);
        # the core reads it back to detect when origin/main has moved on.
        SPECTRE_BUILD_SHA: "${SPECTRE_BUILD_SHA:-}"
    image: spectre-core:local
    env_file: [.env.docker]
    environment:
      PORT: "8787"
      HOSTNAME: "0.0.0.0"
      OLLAMA_HOST: "http://host.docker.internal:11434"
      SPECTRE_MCP_BROKER: "1"
      # The core is a compiled binary, so it spawns the broker BINARY (not node+.mjs).
      SPECTRE_MCP_BROKER_BIN: "/app/dist/spectre-broker"
      SPECTRE_APP_URL: "http://127.0.0.1:8787"
      # Standard brain → the bundled LiteLLM gateway.
      SPECTRE_LITELLM_URL: "http://litellm:4000/v1"
      SPECTRE_LITELLM_KEY: "${LITELLM_MASTER_KEY:-sk-spectre}"
      SPECTRE_LITELLM_MODEL: "${SPECTRE_LITELLM_MODEL:-spectre-default}"
      # CLI tool brains (opt-in); each gated by its own flag and uses your own subscription.
      SPECTRE_ALLOW_CLAUDE_CLI: "${SPECTRE_ALLOW_CLAUDE_CLI:-}"
      SPECTRE_ALLOW_CODEX_CLI: "${SPECTRE_ALLOW_CODEX_CLI:-}"
      SPECTRE_ALLOW_GEMINI_CLI: "${SPECTRE_ALLOW_GEMINI_CLI:-}"
      # The core runs as root in-container; claude-code 2.x refuses
      # --dangerously-skip-permissions under root unless it's told it's sandboxed.
      # The container IS the sandbox (isolated, own subscription), so opt in.
      IS_SANDBOX: "1"
      # Screenshot tool → the Playwright shotter sidecar (only up with --profile screenshot);
      # default capture target is the shell UI (authed pages need SPECTRE_SHOTTER_COOKIE).
      SPECTRE_SHOTTER_URL: "http://shotter:8008/shot"
      SPECTRE_SHELL_URL: "http://shell:3100"
      # Persistent, user-extensible harness dir: drop skills/, tools/, mcp/ into
      # ./spectre-data on the host and they overlay the baked built-ins + survive
      # restarts/re-pulls (the brain reads them live). See docs + installer.
      SPECTRE_DATA_DIR: "/data"
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - "${SPECTRE_DATA_DIR_HOST:-./spectre-data}:/data"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: [litellm]
    restart: unless-stopped

  chat-runner:
    # Reuses the core image built above (no build: key → no rebuild), different entrypoint.
    image: spectre-core:local
    command: ["/app/dist/spectre-chat-runner"]
    env_file: [.env.docker]
    environment:
      SPECTRE_APP_URL: "http://core:8787"
    # Reaches the host for Ollama + the local self-hosted DB gateway
    # (SUPABASE_URL=http://host.docker.internal:8000). Required on Linux.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: [core]
    restart: unless-stopped

  scheduler:
    # Reuses the core image built above (no build: key → no rebuild), different entrypoint.
    image: spectre-core:local
    command: ["/app/dist/spectre-scheduler"]
    env_file: [.env.docker]
    environment:
      SPECTRE_APP_URL: "http://core:8787"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: [core]
    restart: unless-stopped

  # Messaging channels: delivers finished assistant replies back out over the
  # channel (Telegram / WhatsApp). Inbound is the core's /api/channels webhook.
  # Active when TELEGRAM_BOT_TOKEN or WHATSAPP_TOKEN is set in .env.docker;
  # otherwise it idles harmlessly. All channel env flows in via env_file.
  channel-runner:
    # Reuses the core image built above (no build: key → no rebuild), different entrypoint.
    image: spectre-core:local
    command: ["/app/dist/spectre-channel-runner"]
    env_file: [.env.docker]
    environment:
      # Fetch generated images (screenshots) from the core to deliver as photos.
      SPECTRE_APP_URL: "http://core:8787"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: [core]
    restart: unless-stopped

  # Screenshot capture (headless Chromium / Playwright). Opt-in — only runs with
  # `docker compose --profile screenshot up` so the base install carries no ~400MB
  # Chromium layer. The core's `screenshot` tool POSTs to it on the compose network.
  shotter:
    build: ./screenshot-sidecar
    profiles: ["screenshot"]
    expose: ["8008"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # The public shell — built locally; holds no storage credentials (the browser
  # rides /api/* through the proxy only).
  # Behind the `ui` profile so a HEADLESS install (core + channels + API only)
  # can leave it out; the installer sets COMPOSE_PROFILES per the chosen profile.
  shell:
    profiles: ["ui"]
    build:
      context: .
      args:
        # Where the Workspaces tab loads the embedded VS Code editor (NEXT_PUBLIC_*
        # is inlined at build time). Default "/code" = same-origin via the edge
        # proxy; override to e.g. http://localhost:8088 for a direct loopback editor.
        # (No Supabase build args: the browser talks only to /api/* — storage
        # credentials never reach the shell image.)
        NEXT_PUBLIC_CODE_SERVER_URL: "${NEXT_PUBLIC_CODE_SERVER_URL:-/code}"
    image: spectre-shell
    env_file: [.env.docker]
    environment:
      PORT: "3100"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: "production"
      CORE_URL: "http://core:8787"
      # /api/workspace/* is proxied here (only resolves when the workspace profile
      # is up); WORKSPACE_SERVICE_TOKEN flows in via env_file.
      WORKSPACE_URL: "http://workspace:8010"
    # Loopback by default — localhost is a secure context so the PIN cookie sets.
    # For tailnet access put it behind HTTPS (`tailscale serve https / → :3100`),
    # else the Secure session cookie is dropped over plain HTTP. See M6-INSTALLER.
    ports:
      - "${SHELL_BIND:-127.0.0.1}:${SHELL_PORT:-3100}:3100"
    depends_on: [core]
    restart: unless-stopped

  # In-browser code Workspaces (opt-in: `--profile workspace`). Two modes:
  # sandbox repo clones (→ commit → PR → close) and TRUSTED local folders
  # (edit/commit/push in place). Bundles git + gh + ripgrep and runs untrusted
  # repo code (npm test / shell), so it is OFF by default and reachable ONLY
  # through the PIN-gated shell, which injects WORKSPACE_SERVICE_TOKEN.
  #
  # ⚠ RISK — be explicit about what this profile is: file edit + terminal on
  # every bind-mounted trusted folder = remote code execution on those host
  # paths for anyone past the gates. The gates are the shell PIN (edge) + the
  # service token; defense-in-depth below: non-root user, all capabilities
  # dropped, no privilege re-escalation. NEVER move CODE_SERVER_BIND/EDGE_BIND
  # off loopback without HTTPS in front.
  workspace:
    build: ./workspace-service
    profiles: ["workspace"]
    env_file: [.env.docker]
    environment:
      PORT: "8010"
      WORKSPACE_ROOT: "/workspaces"
      # WORKSPACE_SERVICE_TOKEN, GH_TOKEN, WORKSPACE_TRUSTED_DIRS come from .env.docker.
    expose: ["8010"]
    volumes:
      - "spectre-workspaces:/workspaces"
      # TRUSTED folders: bind-mount each host path to the container path listed in
      # WORKSPACE_TRUSTED_DIRS (the Workspace tab edits them in place via Monaco).
      - "C:/Users/elias/projects/spectre_dev:/trusted/spectre_dev"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped

  # The Workspaces editor: code-server (VS Code in the browser) sharing the same
  # volume so it edits the same files. Opt-in with `--profile workspace`.
  # Defense-in-depth auth: the shell PIN at the edge is the primary gate, but the
  # editor ALSO requires its own password (CODE_SERVER_PASSWORD, generated by the
  # installer) so a slipped bind/edge misconfig doesn't expose a passwordless
  # terminal. If the password is unset, code-server falls back to a random one in
  # its container config (locked out = fail closed); set CODE_SERVER_AUTH=none
  # only if you understand you're back to PIN-only protection.
  code-server:
    image: codercom/code-server:latest
    profiles: ["workspace"]
    command: ["--auth", "${CODE_SERVER_AUTH:-password}", "--disable-telemetry", "--bind-addr", "0.0.0.0:8080", "/workspaces"]
    environment:
      PASSWORD: "${CODE_SERVER_PASSWORD:-}"
      # Terminal GitHub token (from .env.docker) for `git push` / `gh`. NOTE: this
      # container runs untrusted repo code and is browser-exposed, so holding a
      # long-lived token here is a deliberate convenience/security trade-off — the
      # service clone/push path does NOT rely on it (it injects per-request). gh
      # reads GH_TOKEN/GITHUB_TOKEN directly.
      GH_TOKEN: "${GH_TOKEN:-}"
      GITHUB_TOKEN: "${GH_TOKEN:-}"
      # Persistent git identity + credential helper injected via env (GIT_CONFIG_*),
      # because $HOME here is not a volume — a `git config --global` wouldn't survive
      # a recreate. Terminal commits are attributed to Spectre (matches the service's
      # commit author + PR credit). The `$$` keeps `$GH_TOKEN` literal in the compose
      # file so the shell expands it at git-run time (never baked into the config).
      GIT_CONFIG_COUNT: "3"
      GIT_CONFIG_KEY_0: "user.name"
      GIT_CONFIG_VALUE_0: "Spectre"
      GIT_CONFIG_KEY_1: "user.email"
      GIT_CONFIG_VALUE_1: "spectre@users.noreply.github.com"
      GIT_CONFIG_KEY_2: "credential.helper"
      GIT_CONFIG_VALUE_2: "!f() { echo username=x-access-token; echo password=$$GH_TOKEN; }; f"
    expose: ["8080"]
    volumes:
      - "spectre-workspaces:/workspaces"
      # Mirror the trusted-folder bind-mounts so the embedded editor can open them.
      - "C:/Users/elias/projects/spectre_dev:/trusted/spectre_dev"
      # Seed a dark default theme + editor prefs (persists on the host).
      - "./deploy/code-server-user:/home/coder/.local/share/code-server/User"
    ports:
      - "${CODE_SERVER_BIND:-127.0.0.1}:${CODE_SERVER_PORT:-8088}:8080"
    # The image ships passwordless sudo for the coder user; no-new-privileges
    # blocks that escalation and ALL caps are dropped (terminals/git don't need any).
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped

  # Edge proxy (opt-in: `--profile workspace`). A same-origin front door so the
  # Workspaces tab can iframe code-server: routes /code/* → code-server (handles
  # the WebSocket upgrade a Next route can't) and everything else → the shell.
  # Access Spectre via THIS (default http://127.0.0.1:8090) to use the editor.
  # For HTTPS/tailnet set SPECTRE_SITE_ADDRESS to your domain + publish 80/443
  # (Caddy auto-TLS, which also satisfies the Secure-cookie requirement).
  # See deploy/Caddyfile. NOTE: validate on a live Linux Docker host.
  edge:
    image: caddy:2
    profiles: ["workspace"]
    environment:
      # Forwarded to the Caddyfile's {$SPECTRE_SITE_ADDRESS} site block. Default
      # ":8090" = plain HTTP on 8090; set to a domain for Caddy auto-TLS.
      SPECTRE_SITE_ADDRESS: "${SPECTRE_SITE_ADDRESS:-:8090}"
    volumes:
      - "./deploy/Caddyfile:/etc/caddy/Caddyfile:ro,Z"
      - "caddy-data:/data"
      - "caddy-config:/config"
    ports:
      - "${EDGE_BIND:-127.0.0.1}:${EDGE_PORT:-8090}:8090"
    # No depends_on the shell (it's in the `ui` profile — a cross-profile dep would
    # error under `--profile workspace` alone); Caddy resolves upstreams lazily.
    depends_on: [code-server]
    restart: unless-stopped

  # Update executor (opt-in: `--profile update`). Lets the Shell apply Spectre
  # updates with a BUTTON — a container can't rebuild itself, so this small sidecar
  # mounts the host Docker socket + the repo and drives scripts/spectre-update.mjs
  # on demand (core proxies the PIN-gated shell) and on a schedule (per-target
  # `auto` reminders). ⚠ PRIVILEGE: host Docker access ≈ root on the host — it is
  # internal-only (no published port) and every route is gated by UPDATER_TOKEN.
  updater:
    build: ./updater-service
    profiles: ["update"]
    env_file: [.env.docker]
    environment:
      PORT: "8020"
      REPO_DIR: "/repo"
      UPDATER_TOKEN: "${UPDATER_TOKEN:-}"
      # The script's health/reminders calls target the core over the compose network.
      SPECTRE_CORE_URL: "http://core:8787"
    volumes:
      # Host Docker socket → run `docker compose build/up` on the host daemon.
      - "/var/run/docker.sock:/var/run/docker.sock"
      # The repo = build contexts + the update script + .env.docker + .git (to pull).
      - ".:/repo"
    expose: ["8020"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  spectre-workspaces:
  caddy-data:
  caddy-config:
