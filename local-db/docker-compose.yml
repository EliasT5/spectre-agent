# Spectre LOCAL DB — a trimmed, self-hosted Supabase (zero cloud account).
#
# Only what Spectre needs: Postgres+pgvector (db), the REST data API (rest /
# PostgREST), Realtime (the durable chat subscribes to postgres_changes), and Kong
# (the gateway that fronts them under one URL + the anon/service API keys). Auth /
# Storage / Studio / Analytics from the full Supabase self-host are intentionally
# dropped — Spectre uses CORE_TOKEN, not Supabase auth.
#
# Brought up by the installer (Local DB choice) or directly:
#   docker compose -f local-db/docker-compose.yml --env-file local-db/.env up -d
# Kong is published on 127.0.0.1:8000 — the core reaches it at
# http://host.docker.internal:8000, the browser at http://localhost:8000.
name: spectre-local-db

services:
  db:
    container_name: spectre-db
    image: supabase/postgres:15.8.1.085
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./volumes/db/realtime.sql:/docker-entrypoint-initdb.d/migrations/99-realtime.sql:Z
      - ./volumes/db/webhooks.sql:/docker-entrypoint-initdb.d/init-scripts/98-webhooks.sql:Z
      - ./volumes/db/roles.sql:/docker-entrypoint-initdb.d/init-scripts/99-roles.sql:Z
      - ./volumes/db/jwt.sql:/docker-entrypoint-initdb.d/init-scripts/99-jwt.sql:Z
      - ./volumes/db/_supabase.sql:/docker-entrypoint-initdb.d/migrations/97-_supabase.sql:Z
      - ./volumes/db/logs.sql:/docker-entrypoint-initdb.d/migrations/99-logs.sql:Z
      - ./volumes/db/pooler.sql:/docker-entrypoint-initdb.d/migrations/99-pooler.sql:Z
      - spectre-db-data:/var/lib/postgresql/data:Z
    environment:
      POSTGRES_HOST: /var/run/postgresql # socket inside the db container
      PGPORT: ${POSTGRES_PORT:-5432}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      # POSTGRES_USER is pinned explicitly to `supabase_admin` — the value the
      # supabase/postgres image uses as its built-in bootstrap superuser. The init
      # SQL files (_supabase.sql, realtime.sql, logs.sql, pooler.sql) all reference
      # $POSTGRES_USER; without an explicit value they would inherit whatever the
      # base image defaults to, and a future image bump could silently change that.
      # DO NOT change this to `postgres`: migrate.sh (run at first boot) connects as
      # supabase_admin first to create all other roles — if initdb bootstraps as
      # `postgres` instead, that initial psql connection fails and no roles are created.
      POSTGRES_USER: supabase_admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY:-3600}
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal

  rest:
    container_name: spectre-rest
    image: postgrest/postgrest:v14.12
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY:-3600}
    command: ["postgrest"]

  realtime:
    container_name: spectre-realtime
    image: supabase/realtime:v2.102.3
    restart: unless-stopped
    # Realtime derives the tenant external_id from the first label of the Host
    # header. The self-host seed creates a tenant `realtime-dev`, so the gateway
    # must reach this container at a hostname whose first label is `realtime-dev`
    # (the official compose does this via container_name). We keep a friendly
    # container_name and add the matching network alias instead.
    networks:
      default:
        aliases:
          - realtime-dev.supabase-realtime
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      METRICS_JWT_SECRET: ${JWT_SECRET}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
      DISABLE_HEALTHCHECK_LOGGING: "true"

  kong:
    container_name: spectre-kong
    image: kong/kong:3.9.1
    restart: unless-stopped
    depends_on: [rest, realtime]
    ports:
      - "127.0.0.1:${KONG_HTTP_PORT:-8000}:8000/tcp"
    volumes:
      - ./volumes/api/kong.yml:/home/kong/temp.yml:ro,z
      - ./volumes/api/kong-entrypoint.sh:/home/kong/kong-entrypoint.sh:ro,z
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth,request-termination,rate-limiting
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_PUBLISHABLE_KEY: ""
      SUPABASE_SECRET_KEY: ""
      ANON_KEY_ASYMMETRIC: ""
      SERVICE_ROLE_KEY_ASYMMETRIC: ""
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-supabase}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-spectre}
    entrypoint: /home/kong/kong-entrypoint.sh

volumes:
  spectre-db-data:
