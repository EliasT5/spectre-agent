<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="360" viewBox="0 0 1480 360" font-family="ui-monospace, Consolas, 'Courier New', monospace">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="1480" height="360" rx="14" fill="#07070e"/>
  <rect x="1" y="1" width="1478" height="358" rx="13" fill="none" stroke="#1d1d33"/>

  <g fill="#cfcfee" opacity="0.5">
    <circle cx="90" cy="50" r="1"/><circle cx="240" cy="320" r="1.2"/><circle cx="420" cy="40" r="0.8"/>
    <circle cx="700" cy="330" r="1"/><circle cx="930" cy="36" r="1.1"/><circle cx="1180" cy="318" r="0.9"/>
    <circle cx="1330" cy="60" r="1"/><circle cx="560" cy="300" r="0.8"/><circle cx="1430" cy="200" r="1.1"/>
    <circle cx="60" cy="250" r="0.9"/><circle cx="820" cy="52" r="0.8"/><circle cx="1075" cy="300" r="1"/>
  </g>

  <g>
    <rect x="50" y="120" width="220" height="120" rx="12" fill="#0d0d1a" stroke="#34345c" stroke-width="1.5"/>
    <text x="160" y="166" text-anchor="middle" fill="#e8e6ff" font-size="20" letter-spacing="3">BROWSER</text>
    <text x="160" y="196" text-anchor="middle" fill="#6f6a96" font-size="12">PWA &#183; WebGL home</text>
    <text x="160" y="216" text-anchor="middle" fill="#6f6a96" font-size="12">never sees a secret</text>
  </g>

  <line x1="270" y1="180" x2="388" y2="180" stroke="#a78bfa" stroke-width="2" marker-end="url(#arr)"/>
  <text x="329" y="162" text-anchor="middle" fill="#a78bfa" font-size="12">PIN cookie</text>
  <text x="329" y="205" text-anchor="middle" fill="#56518a" font-size="11">HMAC-signed</text>

  <g>
    <rect x="392" y="100" width="280" height="160" rx="12" fill="#0d0d1a" stroke="#5346a8" stroke-width="1.5"/>
    <text x="532" y="142" text-anchor="middle" fill="#e8e6ff" font-size="20" letter-spacing="3">SHELL</text>
    <text x="532" y="164" text-anchor="middle" fill="#8f88c2" font-size="12">spectre-agent &#183; this repo</text>
    <text x="532" y="196" text-anchor="middle" fill="#6f6a96" font-size="12">PIN gate &#183; proxy &#183; UI</text>
    <text x="532" y="216" text-anchor="middle" fill="#6f6a96" font-size="12">module sandbox</text>
    <text x="532" y="236" text-anchor="middle" fill="#6f6a96" font-size="12">MIT &#183; open source</text>
  </g>

  <line x1="672" y1="180" x2="790" y2="180" stroke="#a78bfa" stroke-width="2" marker-end="url(#arr)"/>
  <text x="731" y="162" text-anchor="middle" fill="#a78bfa" font-size="12">CORE_TOKEN</text>
  <text x="731" y="205" text-anchor="middle" fill="#56518a" font-size="11">loopback :8787</text>

  <g>
    <rect x="794" y="84" width="300" height="192" rx="12" fill="#11091f" stroke="#7c5cff" stroke-width="2" filter="url(#glow)"/>
    <text x="944" y="126" text-anchor="middle" fill="#f1edff" font-size="20" letter-spacing="3">CORE</text>
    <text x="944" y="148" text-anchor="middle" fill="#9d8fd8" font-size="12">spectre-core &#183; sealed image</text>
    <text x="944" y="180" text-anchor="middle" fill="#8a82b8" font-size="12">brain &#183; memory &#183; scheduler</text>
    <text x="944" y="200" text-anchor="middle" fill="#8a82b8" font-size="12">MCP tool broker + approvals</text>
    <text x="944" y="220" text-anchor="middle" fill="#8a82b8" font-size="12">self-improvement loop</text>
    <text x="944" y="252" text-anchor="middle" fill="#5d5786" font-size="11">workers: chat &#183; schedules &#183; channels</text>
  </g>

  <line x1="1094" y1="180" x2="1208" y2="180" stroke="#a78bfa" stroke-width="2" marker-end="url(#arr)"/>
  <text x="1151" y="162" text-anchor="middle" fill="#a78bfa" font-size="12">OpenAI API</text>

  <g>
    <rect x="1212" y="92" width="218" height="176" rx="12" fill="#0d0d1a" stroke="#34345c" stroke-width="1.5"/>
    <text x="1321" y="130" text-anchor="middle" fill="#e8e6ff" font-size="17" letter-spacing="2">YOUR MODELS</text>
    <text x="1321" y="158" text-anchor="middle" fill="#8f88c2" font-size="12">LiteLLM gateway</text>
    <text x="1321" y="186" text-anchor="middle" fill="#6f6a96" font-size="12">Ollama &#183; Anthropic</text>
    <text x="1321" y="206" text-anchor="middle" fill="#6f6a96" font-size="12">OpenAI &#183; Gemini</text>
    <text x="1321" y="226" text-anchor="middle" fill="#6f6a96" font-size="12">vLLM &#183; 100+ more</text>
    <text x="1321" y="252" text-anchor="middle" fill="#56518a" font-size="11">your keys or no keys</text>
  </g>

  <text x="944" y="312" text-anchor="middle" fill="#56518a" font-size="12">bundled local database by default &#8212; or your own Supabase</text>
  <line x1="944" y1="276" x2="944" y2="296" stroke="#34345c" stroke-width="1.5" stroke-dasharray="3 4"/>
</svg>
